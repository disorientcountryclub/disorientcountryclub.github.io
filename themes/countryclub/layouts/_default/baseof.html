<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
  {{ partial "head.html" . }}
  <body>
    {{ partial "header.html" . }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    <div id="image-modal" class="image-modal" onclick="this.classList.remove('active')">
      <img id="modal-img" src="" alt="">
    </div>
    <div id="role-modal" class="role-modal" onclick="this.classList.remove('active')">
      <div class="role-modal-content" onclick="document.getElementById('role-modal').classList.remove('active')">
        <div id="role-modal-icon" class="role-modal-icon"></div>
        <div id="role-modal-name" class="role-modal-name"></div>
        <div id="role-modal-desc" class="role-modal-desc"></div>
      </div>
    </div>
    <script>
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('content-image')) {
        var modal = document.getElementById('image-modal');
        document.getElementById('modal-img').src = e.target.src;
        modal.classList.add('active');
      }
    });
    function openRoleModal(card) {
      var icon = card.querySelector('.role-icon').innerHTML;
      var name = card.querySelector('.role-name').textContent;
      var desc = card.querySelector('.role-description').innerHTML;
      document.getElementById('role-modal-icon').innerHTML = icon;
      document.getElementById('role-modal-name').textContent = name;
      document.getElementById('role-modal-desc').innerHTML = desc;
      document.getElementById('role-modal').classList.add('active');
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('image-modal').classList.remove('active');
        document.getElementById('role-modal').classList.remove('active');
      }
    });
    </script>
  </body>
</html>
